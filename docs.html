<!DOCTYPE html>
<html>
<head>
    <title>Notion Docs</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: #171717;
            padding: 12px;
            overflow-y: auto;
            border-right: 1px solid #2a2a2a;
        }

        h3 {
            font-size: 14px;
            color: #aaa;
            margin: 10px 0;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #222;
            border: none;
            color: white;
            border-radius: 6px;
        }

        button {
            width: 100%;
            padding: 8px;
            margin: 4px 0;
            background: #222;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 6px;
            text-align: left;
        }

        button:hover {
            background: #2a2a2a;
        }

        .delete {
            background: #3a1f1f;
        }

        .delete:hover {
            background: #5a2a2a;
        }

        /* MAIN */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #topbar {
            padding: 10px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: #0f0f0f;
            border: none;
            color: white;
            padding: 20px;
            font-size: 16px;
            outline: none;
            resize: none;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h3>📁 FOLDERS</h3>

    <input id="folderName" placeholder="New folder">
    <button onclick="createFolder()">+ New Folder</button>

    <div id="folderList"></div>

    <h3>📄 DOCS</h3>

    <input id="docName" placeholder="New doc">
    <button onclick="createDoc()">+ New Doc</button>

    <div id="docList"></div>
</div>

<!-- MAIN -->
<div id="main">
    <div id="topbar">
        <div class="title" id="title">Select a doc</div>
    </div>

    <textarea id="text" placeholder="Start typing..."></textarea>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    // 🔴 your config here
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentFolder = null;
let currentDoc = null;

/* AUTH */
auth.onAuthStateChanged(user => {
    if (user) loadFolders();
});

/* ---------------- FOLDERS ---------------- */

function createFolder() {
    const user = auth.currentUser;
    const name = document.getElementById("folderName").value;
    if (!name) return;

    db.ref("docs/" + user.uid + "/folders/" + name).set({});
    loadFolders();
}

function loadFolders() {
    const user = auth.currentUser;

    db.ref("docs/" + user.uid + "/folders").on("value", snap => {
        const list = document.getElementById("folderList");
        list.innerHTML = "";

        snap.forEach(f => {
            const name = f.key;

            const wrap = document.createElement("div");

            const btn = document.createElement("button");
            btn.innerText = "📁 " + name;
            btn.onclick = () => openFolder(name);

            const del = document.createElement("button");
            del.innerText = "🗑 Delete";
            del.className = "delete";
            del.onclick = () => {
                db.ref("docs/" + user.uid + "/folders/" + name).remove();
            };

            wrap.appendChild(btn);
            wrap.appendChild(del);
            list.appendChild(wrap);
        });
    });
}

/* ---------------- DOCS ---------------- */

function openFolder(name) {
    currentFolder = name;
    loadDocs();
}

function createDoc() {
    const user = auth.currentUser;
    const name = document.getElementById("docName").value;
    if (!currentFolder || !name) return;

    db.ref("docs/" + user.uid + "/folders/" + currentFolder + "/" + name)
    .set({ text: "" });

    loadDocs();
}

function loadDocs() {
    const user = auth.currentUser;

    db.ref("docs/" + user.uid + "/folders/" + currentFolder)
    .on("value", snap => {
        const list = document.getElementById("docList");
        list.innerHTML = "";

        snap.forEach(d => {
            const name = d.key;
            if (name === ".priority") return;

            const wrap = document.createElement("div");

            const btn = document.createElement("button");
            btn.innerText = "📄 " + name;
            btn.onclick = () => openDoc(name);

            const del = document.createElement("button");
            del.innerText = "🗑 Delete";
            del.className = "delete";
            del.onclick = () => {
                db.ref("docs/" + auth.currentUser.uid + "/folders/" + currentFolder + "/" + name).remove();
            };

            wrap.appendChild(btn);
            wrap.appendChild(del);
            list.appendChild(wrap);
        });
    });
}

/* ---------------- DOC ---------------- */

function openDoc(name) {
    currentDoc = name;

    const user = auth.currentUser;

    document.getElementById("title").innerText =
        currentFolder + " / " + name;

    const ref = db.ref("docs/" + user.uid + "/folders/" + currentFolder + "/" + name);

    ref.on("value", snap => {
        document.getElementById("text").value = snap.val()?.text || "";
    });

    document.getElementById("text").oninput = () => {
        ref.set({
            text: document.getElementById("text").value
        });
    };
}
</script>

</body>
</html>
