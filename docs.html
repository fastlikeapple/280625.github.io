<!DOCTYPE html>
<html>
<head>
    <title>Docs Hub</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
            background: #111;
            color: white;
        }

        /* SIDEBAR */
        #sidebar {
            width: 260px;
            background: #1a1a1a;
            padding: 10px;
            overflow-y: auto;
        }

        h3 {
            margin: 10px 0;
        }

        input {
            width: 90%;
            padding: 6px;
            margin: 5px 0;
        }

        button {
            width: 100%;
            margin: 4px 0;
            padding: 8px;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
        }

        button:hover {
            background: #444;
        }

        .delete {
            background: #aa3333;
        }

        .delete:hover {
            background: #cc4444;
        }

        /* MAIN */
        #main {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            padding: 10px;
            font-size: 14px;
            margin-top: 10px;
        }

        .row {
            display: flex;
            gap: 5px;
        }

        .row button {
            width: auto;
            flex: 1;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar">
    <h3>📁 Folders</h3>

    <input id="folderName" placeholder="New folder">
    <button onclick="createFolder()">➕ Add Folder</button>

    <div id="folderList"></div>

    <hr>

    <h3>📄 Docs</h3>

    <input id="docName" placeholder="New doc">
    <button onclick="createDoc()">➕ Add Doc</button>

    <div id="docList"></div>
</div>

<!-- MAIN -->
<div id="main">
    <h3 id="title">Select a folder + doc</h3>

    <textarea id="text" placeholder="Select a doc..."></textarea>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    // 🔴 YOUR CONFIG HERE
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentFolder = null;
let currentDoc = null;

/* AUTH */
auth.onAuthStateChanged(user => {
    if (user) {
        loadFolders();
    }
});

/* ---------------- FOLDERS ---------------- */

function createFolder() {
    const user = auth.currentUser;
    const name = document.getElementById("folderName").value;
    if (!name) return;

    db.ref("docs/" + user.uid + "/folders/" + name).set({});

    loadFolders();
}

function loadFolders() {
    const user = auth.currentUser;

    db.ref("docs/" + user.uid + "/folders").on("value", snap => {
        const list = document.getElementById("folderList");
        list.innerHTML = "";

        snap.forEach(f => {
            const name = f.key;

            const wrap = document.createElement("div");

            const btn = document.createElement("button");
            btn.innerText = "📁 " + name;
            btn.onclick = () => openFolder(name);

            const del = document.createElement("button");
            del.innerText = "🗑 Delete";
            del.className = "delete";
            del.onclick = () => {
                db.ref("docs/" + user.uid + "/folders/" + name).remove();
                if (currentFolder === name) {
                    currentFolder = null;
                    document.getElementById("docList").innerHTML = "";
                    document.getElementById("text").value = "";
                }
            };

            wrap.appendChild(btn);
            wrap.appendChild(del);
            list.appendChild(wrap);
        });
    });
}

/* ---------------- DOCS ---------------- */

function openFolder(name) {
    currentFolder = name;
    document.getElementById("title").innerText = "📁 " + name;
    loadDocs();
}

function createDoc() {
    const user = auth.currentUser;
    const name = document.getElementById("docName").value;
    if (!currentFolder || !name) return;

    db.ref("docs/" + user.uid + "/folders/" + currentFolder + "/" + name).set({
        text: ""
    });

    loadDocs();
}

function loadDocs() {
    const user = auth.currentUser;

    db.ref("docs/" + user.uid + "/folders/" + currentFolder).on("value", snap => {
        const list = document.getElementById("docList");
        list.innerHTML = "";

        snap.forEach(d => {
            const name = d.key;
            if (name === ".priority") return;

            const wrap = document.createElement("div");

            const btn = document.createElement("button");
            btn.innerText = "📄 " + name;
            btn.onclick = () => openDoc(name);

            const del = document.createElement("button");
            del.innerText = "🗑 Delete";
            del.className = "delete";
            del.onclick = () => {
                db.ref("docs/" + auth.currentUser.uid + "/folders/" + currentFolder + "/" + name).remove();
                document.getElementById("text").value = "";
            };

            wrap.appendChild(btn);
            wrap.appendChild(del);
            list.appendChild(wrap);
        });
    });
}

/* ---------------- OPEN DOC ---------------- */

function openDoc(name) {
    currentDoc = name;

    const user = auth.currentUser;

    db.ref("docs/" + user.uid + "/folders/" + currentFolder + "/" + name)
    .on("value", snap => {
        document.getElementById("text").value = snap.val()?.text || "";
    });

    document.getElementById("text").oninput = () => {
        db.ref("docs/" + user.uid + "/folders/" + currentFolder + "/" + name).set({
            text: document.getElementById("text").value
        });
    };
}
</script>

</body>
</html>
